name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

# action-pin-check is a *gate*: test and build declare `needs: action-pin-check`
# so they do not execute until pinning has been validated. The gate's own checkout
# is SHA-pinned (bootstrap exception: one pinned action runs before validation).
jobs:
  action-pin-check:
    name: Action pin check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Verify every uses ref is SHA-pinned
        run: ./scripts/check-action-pins.sh

  test:
    needs: action-pin-check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Check formatting
        run: ruff format --check src/ tests/

      - name: Run linter
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest --tb=short -q --cov --cov-report=term-missing

  build:
    needs: action-pin-check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Build sdist and wheel
        run: |
          pip install "build==1.5.0"
          python -m build

      - name: Install built wheel
        run: pip install dist/*.whl

      - name: Verify bundled assets
        working-directory: ${{ runner.temp }}
        run: env -u PYTHONPATH python "$GITHUB_WORKSPACE/scripts/verify_wheel_assets.py" "$GITHUB_WORKSPACE"

      - name: Upload artifacts
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/
          retention-days: 3

  publish:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    needs: [test, build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
